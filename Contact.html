  <!DOCTYPE html>
<a href="index.html" class="back-home-btn">← Back to Home</a>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.95;
        }
        
        .contact-content {
            padding: 60px 40px;
            text-align: center;
        }
        
        h2 {
            margin-bottom: 30px;
            color: #333;
            font-size: 1.8rem;
        }
        
        .phone-numbers {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .phone-card {
            background: #f8f9fa;
            padding: 25px 35px;
            border-radius: 12px;
            border: 2px solid #e9ecef;
            min-width: 220px;
            transition: all 0.3s ease;
        }
        
        .phone-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.2);
            border-color: #007bff;
        }
        
        .phone-card h3 {
            color: #007bff;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
        
        .phone {
            font-size: 1.7rem;
            font-weight: bold;
            color: #222;
            text-decoration: none;
        }
        
        .phone:hover {
            color: #007bff;
        }
        
        footer {
            text-align: center;
            padding: 25px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Contact Us</h1>
            <p class="subtitle">Reach out to us via phone</p>
        </header>
        
        <div class="contact-content">
            <h2>Our Contact Numbers</h2>
            
            <div class="phone-numbers">
                <div class="phone-card">
                    <h3>Primary Number</h3>
                    <a href="tel:0713333777" class="phone">071 333 3777</a>
                </div>
                
                <div class="phone-card">
                    <h3>Secondary Number</h3>
                    <a href="tel:0823333789" class="phone">082 333 3789</a>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <footer>
            <p>&copy; 2026 Your Company Name. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
